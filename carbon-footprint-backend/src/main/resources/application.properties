# Server
server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/carbon_footprint?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA and migrations
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
app.schema-compatibility.enabled=${SCHEMA_COMPATIBILITY_ENABLED:true}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# Frontend and CORS
app.frontend.reset-password-url=${RESET_PASSWORD_URL:http://localhost:5173/reset-password}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,https://*.trycloudflare.com}

# Authentication
app.auth.jwt-secret=${JWT_SECRET:change-this-development-secret-minimum-32-chars}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
app.auth.dev-otp-console-fallback=${DEV_OTP_CONSOLE_FALLBACK:true}

# Default admin
app.admin.default-email=${DEFAULT_ADMIN_EMAIL:krishangcg0@gmail.com}
app.admin.default-password=${DEFAULT_ADMIN_PASSWORD:krish2005}

# Community escalation
app.bbmp.complaint-email=${BBMP_COMPLAINT_EMAIL:}

# Goal summaries
app.goal.weekly-summary-cron=${GOAL_WEEKLY_SUMMARY_CRON:0 0 8 ? * MON}
app.goal.weekly-summary-zone=${GOAL_WEEKLY_SUMMARY_ZONE:Asia/Kolkata}

# AI assistant
deepseek.api.url=${DEEPSEEK_API_URL:https://integrate.api.nvidia.com/v1}
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.model=${DEEPSEEK_MODEL:deepseek-ai/deepseek-v4-pro}
